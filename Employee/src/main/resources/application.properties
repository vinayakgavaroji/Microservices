#Service.EMPLOYEE_NOT_FOUND = Employee not found with id:
#Service.EMPLOYEE_ID_MISMATCH = Id mismatch
#Service.EMPLOYEE_INVALID_ID = Please provide valid employee id
#Service.NO_EMPLOYEES = No employees found

spring.application.name=employee


# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/microservice?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ===============================
# EUREKA SERVER FOR MICROSERVICE
# ===============================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=hostname

address.service.url=http://localhost:8082/address

# ===============================
# SERVER PORT
# ===============================
server.port=8081